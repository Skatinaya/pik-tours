  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #080f0b;
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── FULL-SCREEN IMAGE ── */
    #scene {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
    }

    #panorama {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      pointer-events: none;
      user-select: none;
    }

    /* ── DARK VIGNETTE ── */
    #vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, rgba(0,0,0,0.45) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* ── SVG HOTSPOT LAYER ── */
    #hotspots {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 10;
      cursor: crosshair;
    }

    .zone {
      fill: transparent;
      cursor: pointer;
      transition: fill 0.2s;
    }
    .zone:hover  { fill: rgba(255,255,255,0.08); }
    .zone.active { fill: rgba(255,255,255,0.13); }

    /* ── HOVER TOOLTIP ── */
    #tooltip {
      position: fixed;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }
    #tooltip.show {
      opacity: 1;
      transform: translateY(0);
    }
    .tt-inner {
      background: rgba(8, 15, 11, 0.82);
      backdrop-filter: blur(18px) saturate(1.6);
      -webkit-backdrop-filter: blur(18px) saturate(1.6);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 14px;
      padding: 14px 18px 16px;
      min-width: 200px;
      max-width: 240px;
    }
    .tt-icon { font-size: 22px; margin-bottom: 6px; }
    .tt-name {
      font-family: 'Unbounded', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .tt-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .tt-items li {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      padding-left: 12px;
      position: relative;
    }
    .tt-items li::before {
      content: '·';
      position: absolute;
      left: 2px;
      color: #2A7A4A;
    }
    .tt-cta {
      display: block;
      margin-top: 12px;
      padding: 8px 0;
      background: #2A7A4A;
      color: #fff;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      border-radius: 7px;
      text-decoration: none;
      pointer-events: auto;
      transition: background 0.15s;
    }
    .tt-cta:hover, .tt-cta:active { background: #1f5e38; }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);

    .logo {
      display: flex; align-items: center; gap: 9px;
      text-decoration: none;
    }
    .logo svg { width: 28px; height: 28px; }
    .logo-text {
      font-family: 'Unbounded', sans-serif;
      font-size: 18px; font-weight: 700;
      color: #fff; letter-spacing: 0.1em;
    }
    .nav-hint {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.04em;
    }
    .nav-btn {
      background: rgba(42,122,74,0.85);
      color: #fff; border: none;
      padding: 9px 20px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .nav-btn:hover { background: #2A7A4A; }

    /* ── PULSE MARKERS ── */
    .marker {
      position: fixed;
      z-index: 15;
      pointer-events: none;
      transform: translate(-50%, -50%);
    }
    .marker-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #fff;
      opacity: 0.9;
      position: relative;
    }
    .marker-dot::after {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.5);
      animation: ping 2s ease-out infinite;
    }
    @keyframes ping {
      0%   { transform: scale(1); opacity: 0.7; }
      70%  { transform: scale(2.2); opacity: 0; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    .marker-label {
      position: absolute;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
      padding: 3px 8px;
      border-radius: 10px;

    #instr-dot {

      border-radius: 50%;
      background: #2A7A4A;

      flex-shrink: 0;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.4; transform:scale(1.5); }
    }

<script>
  const tooltip  = document.getElementById('tooltip');
  const ttIcon   = document.getElementById('tt-icon');
  const ttName   = document.getElementById('tt-name');
  const ttItems  = document.getElementById('tt-items');
  const ttCta    = document.getElementById('tt-cta');
  const instr    = document.getElementById('instruction');

  let instrHidden = false;
  let activeZone  = null;

  function showTip(zone, mx, my) {
    const icon   = zone.dataset.icon;
    const name   = zone.dataset.name;
    const tours  = zone.dataset.tours.split('|');
    const page   = zone.dataset.page;

    ttIcon.textContent = icon;
    ttName.textContent = name;
    ttItems.innerHTML  = tours.map(t => `<li>${t}</li>`).join('');
    ttCta.href         = page;
    ttCta.textContent  = `Смотреть туры →`;

    tooltip.classList.add('show');
    posTip(mx, my);

    if (!instrHidden) { instrHidden = true; instr.classList.add('fade'); }
  }

  function posTip(mx, my) {
    const W = window.innerWidth, H = window.innerHeight;
    const tip = tooltip.getBoundingClientRect();
    const tw = tip.width  || 240;
    const th = tip.height || 220;
    const MARGIN = 16;
    let left = mx + 20;
    let top  = my - th / 2;
    if (left + tw + MARGIN > W) left = mx - tw - 20;
    if (top < MARGIN) top = MARGIN;
    if (top + th + MARGIN > H) top = H - th - MARGIN;
    tooltip.style.left = left + 'px';
    tooltip.style.top  = top  + 'px';
  }

  function hideTip() {
    tooltip.classList.remove('show');
    activeZone = null;
    document.querySelectorAll('.zone').forEach(z => z.classList.remove('active'));
  }

  // Mouse interaction
  const svg = document.getElementById('hotspots');

  svg.addEventListener('mousemove', e => {
    const els  = document.elementsFromPoint(e.clientX, e.clientY);
    const zone = els.find(el => el.classList && el.classList.contains('zone'));
    if (zone) {
      if (activeZone !== zone) {
        document.querySelectorAll('.zone').forEach(z => z.classList.remove('active'));
        zone.classList.add('active');
        activeZone = zone;
        showTip(zone, e.clientX, e.clientY);
      } else {
        posTip(e.clientX, e.clientY);
      }
    } else {
      hideTip();
    }
  });

  svg.addEventListener('mouseleave', hideTip);

  // Click → navigate to tour page
  svg.addEventListener('click', e => {
    const els  = document.elementsFromPoint(e.clientX, e.clientY);
    const zone = els.find(el => el.classList && el.classList.contains('zone'));
    if (zone) window.location.href = zone.dataset.page;
  });

  // Touch — tap once to show tooltip, tap again to navigate
  svg.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    const els  = document.elementsFromPoint(t.clientX, t.clientY);
    const zone = els.find(el => el.classList && el.classList.contains('zone'));
    if (!zone) { hideTip(); return; }
    if (activeZone === zone) {
      // second tap → go
      window.location.href = zone.dataset.page;
    } else {
      document.querySelectorAll('.zone').forEach(z => z.classList.remove('active'));
      zone.classList.add('active');
      activeZone = zone;
      showTip(zone, t.clientX, t.clientY);
    }
  }, { passive: false });
</script>

e": "guide", "url": "catalog.html", "tags": "гид дайвинг инструктор PADI море"}, {"title": "Домики у моря «Бухта»", "type": "service", "zone": "hotel", "url": "catalog.html", "tags": "жильё домик море побережье"}];
const ZONE_LABELS = {"ski": "⛷️ Горы", "river": "🏞️ Река", "meadow": "🌿 Луга", "sea": "🌊 Море", "hotel": "🏨 Жильё", "camp": "⛺ Кемпинг", "guide": "🧭 Гид", "rental": "🏍️ Прокат", "food": "🍽️ Питание", "transfer": "🚐 Трансфер"};

function openSearch() {
  document.getElementById('searchOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('searchInput').focus(), 100);
}
function closeSearch() {
  document.getElementById('searchOverlay').classList.remove('open');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').innerHTML = '';
}
document.addEventListener('keydown', e => {
  if ((e.metaKey||e.ctrlKey) && e.key==='k') { e.preventDefault(); openSearch(); }
  if (e.key==='Escape') closeSearch();
});

function doSearch(q) {
  const box = document.getElementById('searchResults');
  q = q.trim().toLowerCase();
  if (!q) { box.innerHTML = '<div class="sr-empty">Начните вводить — покажем туры и услуги</div>'; return; }
  const results = PIK_INDEX.filter(item =>
    item.title.toLowerCase().includes(q) || item.tags.toLowerCase().includes(q)
  );
  if (!results.length) { box.innerHTML = '<div class="sr-empty">Ничего не найдено — попробуйте другой запрос</div>'; return; }
  box.innerHTML = results.slice(0, 8).map(r => `
    <a class="sr-item" href="${r.url}">
      <span class="sr-badge ${r.type}">${r.type==='tour'?'Тур':'Услуга'}</span>
      <div class="sr-info">
        <div class="sr-title">${r.title}</div>
        <div class="sr-zone">${ZONE_LABELS[r.zone]||r.zone}</div>
      </div>
    </a>
  `).join('');
}
</script>
